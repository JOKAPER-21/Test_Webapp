<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Railway Yard Drawing Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#0b1a12;
color:#fff;
margin:0;
padding:20px;
}

h1{
color:#4cff8f;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#123020;
padding:10px;
text-align:left;
}

td{
padding:8px;
border-bottom:1px solid #1f3a2b;
}

tr:hover{
background:#10241a;
}

input,select{
background:#0e2418;
color:white;
border:1px solid #2e6047;
padding:5px;
width:100%;
}

button{
background:#28c76f;
border:none;
padding:6px 10px;
cursor:pointer;
color:black;
font-weight:600;
}

button:hover{
background:#22a45d;
}

.status{
font-weight:600;
}

</style>
</head>

<body>

<h1>Railway Yard Production Tracker</h1>

<table id="tracker">
<thead>
<tr>
<th>WORK</th>
<th>Section</th>
<th>Y CODE</th>
<th>Yard Name</th>
<th>KM</th>
<th>Type</th>
<th>Priority</th>
<th>Yard Size</th>
<th>Planned Start</th>
<th>Planned End</th>
<th>Remaining</th>
<th>Artist</th>
<th>Clean up</th>
<th>Gradient</th>
<th>Final Review</th>
<th>Issue</th>
<th>Save</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

const API="PASTE_YOUR_APPS_SCRIPT_URL_HERE";

let sheetData=[];



async function loadData(){

const res=await fetch(API);
sheetData=await res.json();

renderTable();

}



function renderTable(){

const tbody=document.querySelector("#tracker tbody");
tbody.innerHTML="";

sheetData.forEach(row=>{

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${row["WORK"]||""}</td>
<td>${row["Section"]||""}</td>
<td>${row["Y CODE"]||""}</td>
<td>${row["Yard Name"]||""}</td>
<td>${row["FLAG KM"]||""}</td>
<td>${row["Y TYPE"]||""}</td>

<td>
<input value="${row["Priority"]||""}" data-field="priority">
</td>

<td>
<input value="${row["Yard Size"]||""}" data-field="yard_size">
</td>

<td>
<input value="${row["Planned Start"]||""}" data-field="planned_start">
</td>

<td>
<input value="${row["Planned End"]||""}" data-field="planned_end">
</td>

<td>${row["Remining Days"]||""}</td>

<td>
<input value="${row["Artist"]||""}" data-field="artist">
</td>

<td>
<input value="${row["Clean up"]||""}" data-field="cleanup">
</td>

<td>
<select data-field="gradient">
<option ${row["New Gradient"]=="TRUE"?"selected":""}>TRUE</option>
<option ${row["New Gradient"]=="FALSE"?"selected":""}>FALSE</option>
</select>
</td>

<td>
<input value="${row["Final Review"]||""}" data-field="review">
</td>

<td>
<input value="${row["Issue"]||""}" data-field="issue">
</td>

<td>
<button onclick="saveRow(this)">Save</button>
</td>

`;

tbody.appendChild(tr);

});

}



async function saveRow(btn){

const tr=btn.closest("tr");

const code=tr.children[2].innerText;

const inputs=tr.querySelectorAll("input,select");

const payload={code:code};

inputs.forEach(el=>{

payload[el.dataset.field]=el.value;

});


await fetch(API,{
method:"POST",
body:JSON.stringify(payload)
});

alert("Updated");

}



loadData();

</script>

</body>
</html>

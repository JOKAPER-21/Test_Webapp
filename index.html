<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCAD Production Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #0f1623;
    --surface2: #151d2e;
    --surface3: #1a2438;
    --border: #1e2d45;
    --border-active: #2a4a7f;
    --accent: #1e6fff;
    --accent2: #00c9a7;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --danger: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    --grid: rgba(30,111,255,0.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events:none; z-index:0;
  }

  /* Top bar */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(10,14,23,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 20px;
    height: 56px;
  }

  .logo {
    display:flex; align-items:center; gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 18px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--accent);
    white-space: nowrap;
  }

  .logo-icon {
    width:28px; height:28px;
    background: var(--accent);
    clip-path: polygon(0 0, 70% 0, 100% 30%, 100% 100%, 0 100%);
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:800; color:#fff;
  }

  .header-divider { width:1px; height:28px; background:var(--border); }

  .project-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 1px;
  }

  .header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }

  .live-badge {
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--accent2); letter-spacing:1px;
    font-family:'Share Tech Mono',monospace;
  }

  .live-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--accent2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(0,201,167,0.4); }
    50% { opacity:.6; box-shadow:0 0 0 4px rgba(0,201,167,0); }
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px; border-radius:4px;
    font-size:12px; cursor:pointer;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600; letter-spacing:1px;
    transition: all .2s;
    display:flex; align-items:center; gap:6px;
  }
  .refresh-btn:hover { border-color:var(--accent); color:var(--accent); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mode switcher */
  .mode-switcher {
    display:flex; align-items:center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:4px; overflow:hidden;
  }

  .mode-btn {
    padding: 6px 20px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600; font-size:13px; letter-spacing:1.5px;
    text-transform:uppercase; cursor:pointer; border:none;
    background:transparent; color:var(--text-muted);
    transition: all .2s; position:relative;
  }

  .mode-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* Main layout */
  main {
    position:relative; z-index:1;
    padding: 20px 24px;
    max-width: 1600px; margin:0 auto;
  }

  /* Stats row */
  .stats-row {
    display:grid; grid-template-columns:repeat(5,1fr); gap:12px;
    margin-bottom:20px;
  }

  .stat-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:6px; padding:14px 16px;
    position:relative; overflow:hidden;
  }

  .stat-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--accent-color, var(--accent));
  }

  .stat-label {
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-muted); margin-bottom:8px;
    font-family:'Barlow Condensed',sans-serif; font-weight:600;
  }

  .stat-value {
    font-family:'Share Tech Mono',monospace;
    font-size:28px; color:var(--text); line-height:1;
  }

  .stat-sub {
    font-size:11px; color:var(--text-muted); margin-top:4px;
  }

  /* Toolbar */
  .toolbar {
    display:flex; align-items:center; gap:10px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }

  .search-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:4px; padding:8px 14px;
    color:var(--text); font-size:13px;
    font-family:'Barlow',sans-serif;
    width:220px; outline:none;
    transition:border-color .2s;
  }
  .search-box::placeholder { color:var(--text-muted); }
  .search-box:focus { border-color:var(--accent); }

  .filter-select {
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--text); font-size:12px;
    padding:8px 12px; border-radius:4px;
    outline:none; cursor:pointer;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600; letter-spacing:.5px;
    transition:border-color .2s;
  }
  .filter-select:focus { border-color:var(--accent); }

  .btn-primary {
    background: var(--accent);
    border:none; color:#fff;
    padding:8px 18px; border-radius:4px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:13px; letter-spacing:1.5px;
    text-transform:uppercase; cursor:pointer;
    transition:all .2s; margin-left:auto;
    display:flex; align-items:center; gap:6px;
  }
  .btn-primary:hover { background:#1459d4; }

  /* Table */
  .table-wrapper {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px; overflow:hidden;
  }

  table {
    width:100%; border-collapse:collapse;
  }

  thead {
    background:var(--surface2);
    border-bottom:1px solid var(--border);
  }

  th {
    padding:11px 14px; text-align:left;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600; font-size:11px;
    letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-muted); white-space:nowrap;
  }

  tr {
    border-bottom:1px solid var(--border);
    transition:background .15s;
  }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--surface2); }

  td {
    padding:11px 14px; font-size:13px;
    vertical-align:middle;
  }

  .drawing-num {
    font-family:'Share Tech Mono',monospace;
    font-size:12px; color:var(--accent);
    letter-spacing:.5px;
  }

  .drawing-title { color:var(--text); font-weight:500; }

  /* Status badge */
  .badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:3px;
    font-size:11px; font-weight:700;
    font-family:'Barlow Condensed',sans-serif;
    letter-spacing:.8px; text-transform:uppercase;
    border:1px solid transparent; white-space:nowrap;
  }

  .badge-dot { width:5px; height:5px; border-radius:50%; }

  .badge-not-started   { background:rgba(100,116,139,.12); border-color:rgba(100,116,139,.3); color:#94a3b8; }
  .badge-not-started .badge-dot { background:#64748b; }
  .badge-in-progress   { background:rgba(30,111,255,.12); border-color:rgba(30,111,255,.3); color:#60a5fa; }
  .badge-in-progress .badge-dot { background:#1e6fff; animation:pulse 1.5s infinite; }
  .badge-review        { background:rgba(245,158,11,.12); border-color:rgba(245,158,11,.3); color:#f59e0b; }
  .badge-review .badge-dot { background:#f59e0b; }
  .badge-completed     { background:rgba(16,185,129,.12); border-color:rgba(16,185,129,.3); color:#10b981; }
  .badge-completed .badge-dot { background:#10b981; }
  .badge-on-hold       { background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.3); color:#ef4444; }
  .badge-on-hold .badge-dot { background:#ef4444; }

  /* Assignee chip */
  .assignee-chip {
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 10px; border-radius:20px;
    background:var(--surface3); border:1px solid var(--border);
    font-size:12px; font-weight:500;
  }

  .avatar {
    width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700; color:#fff;
    flex-shrink:0;
  }

  /* Progress bar */
  .progress-bar {
    height:4px; background:var(--surface3); border-radius:2px;
    overflow:hidden; width:80px;
  }
  .progress-fill {
    height:100%; border-radius:2px;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    transition:width .4s ease;
  }

  /* Tree view (Yard) */
  .tree-container {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:8px; overflow:hidden;
  }

  .tree-header {
    background:var(--surface2);
    border-bottom:1px solid var(--border);
    padding:12px 16px;
    display:flex; align-items:center; gap:10px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:13px; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted);
  }

  .tree-node {
    border-bottom:1px solid var(--border);
  }
  .tree-node:last-child { border-bottom:none; }

  .tree-section-header {
    display:flex; align-items:center; gap:10px;
    padding:13px 16px; cursor:pointer;
    background:var(--surface2);
    border-bottom:1px solid var(--border);
    transition:background .15s;
  }
  .tree-section-header:hover { background:var(--surface3); }

  .tree-toggle {
    width:18px; height:18px;
    background:var(--surface3); border:1px solid var(--border);
    border-radius:3px; display:flex; align-items:center; justify-content:center;
    font-size:10px; color:var(--accent); flex-shrink:0;
    transition:transform .2s;
  }

  .tree-section-name {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:14px; letter-spacing:1px;
    text-transform:uppercase; flex:1;
  }

  .tree-count {
    font-family:'Share Tech Mono',monospace;
    font-size:11px; color:var(--text-muted);
    background:var(--surface3); border:1px solid var(--border);
    padding:2px 8px; border-radius:3px;
  }

  .tree-children { display:none; }
  .tree-children.open { display:block; }

  .tree-sub-header {
    display:flex; align-items:center; gap:10px;
    padding:10px 16px 10px 36px; cursor:pointer;
    border-bottom:1px solid var(--border);
    transition:background .15s;
    background:var(--surface);
  }
  .tree-sub-header:hover { background:var(--surface2); }

  .tree-connector {
    width:16px; height:16px; flex-shrink:0;
    position:relative;
  }
  .tree-connector::before {
    content:''; position:absolute;
    left:6px; top:0; bottom:50%; width:1px;
    background:var(--border-active);
  }
  .tree-connector::after {
    content:''; position:absolute;
    left:6px; top:50%; right:0; height:1px;
    background:var(--border-active);
  }

  .tree-sub-name {
    font-family:'Share Tech Mono',monospace;
    font-size:12px; color:var(--accent); flex:1;
    letter-spacing:.5px;
  }

  .tree-sub-children { display:none; }
  .tree-sub-children.open { display:block; }

  .tree-leaf {
    display:flex; align-items:center; gap:10px;
    padding:9px 16px 9px 60px;
    border-bottom:1px solid var(--border);
    transition:background .15s;
    font-size:13px;
  }
  .tree-leaf:last-child { border-bottom:none; }
  .tree-leaf:hover { background:var(--surface2); }

  .tree-leaf-connector {
    width:24px; height:16px; flex-shrink:0;
    position:relative;
  }
  .tree-leaf-connector::before {
    content:''; position:absolute;
    left:0; top:0; bottom:50%; width:1px;
    background:var(--border);
  }
  .tree-leaf-connector::after {
    content:''; position:absolute;
    left:0; top:50%; right:0; height:1px;
    background:var(--border);
  }

  /* Modal */
  .modal-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.7); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center;
  }
  .modal-overlay.open { display:flex; }

  .modal {
    background:var(--surface);
    border:1px solid var(--border-active);
    border-radius:8px; width:500px; max-width:95vw;
    box-shadow:0 24px 80px rgba(0,0,0,.6);
    animation: modalIn .2s ease;
  }

  @keyframes modalIn {
    from { opacity:0; transform:scale(.95) translateY(-10px); }
    to { opacity:1; transform:scale(1) translateY(0); }
  }

  .modal-header {
    padding:16px 20px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }

  .modal-title {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:15px; letter-spacing:2px;
    text-transform:uppercase; color:var(--accent);
  }

  .modal-close {
    background:none; border:none; color:var(--text-muted);
    font-size:18px; cursor:pointer; padding:2px 6px;
    border-radius:3px; transition:all .15s;
  }
  .modal-close:hover { color:var(--text); background:var(--surface2); }

  .modal-body { padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }

  .field { display:flex; flex-direction:column; gap:6px; }
  .field.full { grid-column:1/-1; }

  .field label {
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-muted); font-family:'Barlow Condensed',sans-serif; font-weight:600;
  }

  .field input, .field select, .field textarea {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text); padding:9px 12px; border-radius:4px;
    font-size:13px; font-family:'Barlow',sans-serif; outline:none;
    transition:border-color .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color:var(--accent);
  }
  .field input::placeholder, .field textarea::placeholder { color:var(--text-muted); }

  .modal-footer {
    padding:14px 20px; border-top:1px solid var(--border);
    display:flex; justify-content:flex-end; gap:10px;
  }

  .btn-cancel {
    background:var(--surface2); border:1px solid var(--border);
    color:var(--text-dim); padding:8px 18px; border-radius:4px;
    font-family:'Barlow Condensed',sans-serif; font-weight:600;
    font-size:13px; letter-spacing:1px; cursor:pointer;
    transition:all .2s;
  }
  .btn-cancel:hover { border-color:var(--text-muted); color:var(--text); }

  /* Status select in rows */
  .status-select {
    background:transparent; border:none; color:inherit;
    font-size:11px; font-weight:700;
    font-family:'Barlow Condensed',sans-serif; letter-spacing:.8px;
    text-transform:uppercase; cursor:pointer; outline:none;
    padding:0; max-width:120px;
  }

  /* Loading */
  .loading-row td {
    text-align:center; padding:40px;
    color:var(--text-muted);
    font-family:'Share Tech Mono',monospace; font-size:12px;
    letter-spacing:2px;
  }

  .spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid var(--border);
    border-top-color:var(--accent);
    border-radius:50%; animation:spin 1s linear infinite;
    vertical-align:middle; margin-right:8px;
  }

  /* Empty state */
  .empty-state {
    text-align:center; padding:60px 20px;
    color:var(--text-muted);
  }

  .empty-state svg { opacity:.3; margin-bottom:12px; }
  .empty-state p { font-size:13px; letter-spacing:1px; }

  /* Status indicator inline edit */
  .status-cell { cursor:pointer; }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--border-active); }

  /* Toast */
  .toast {
    position:fixed; bottom:24px; right:24px; z-index:300;
    background:var(--surface);
    border:1px solid var(--border-active);
    border-left:3px solid var(--accent2);
    border-radius:6px; padding:12px 16px;
    font-size:13px; color:var(--text);
    box-shadow:0 8px 32px rgba(0,0,0,.4);
    transform:translateY(80px); opacity:0;
    transition:all .3s cubic-bezier(.34,1.56,.64,1);
    max-width:280px;
  }
  .toast.show { transform:translateY(0); opacity:1; }

  /* Section label */
  .section-label {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700; font-size:11px; letter-spacing:2px;
    text-transform:uppercase; color:var(--text-muted);
    margin-bottom:10px; padding-left:2px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* inline status editor */
  .status-wrapper { position:relative; display:inline-flex; }
  .status-dropdown {
    position:absolute; top:calc(100% + 4px); left:0; z-index:50;
    background:var(--surface);
    border:1px solid var(--border-active);
    border-radius:4px; min-width:150px;
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    display:none;
  }
  .status-dropdown.open { display:block; }
  .status-option {
    padding:8px 12px; cursor:pointer; font-size:12px;
    font-family:'Barlow Condensed',sans-serif; font-weight:600;
    letter-spacing:.8px; text-transform:uppercase;
    transition:background .15s;
    display:flex; align-items:center; gap:8px;
  }
  .status-option:hover { background:var(--surface2); }

  /* column widths */
  .col-num { width:120px; }
  .col-title { min-width:200px; }
  .col-section { width:150px; }
  .col-sub { width:130px; }
  .col-status { width:150px; }
  .col-assignee { width:140px; }
  .col-progress { width:110px; }
  .col-actions { width:60px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">CAD</div>
    AutoCAD Tracker
  </div>
  <div class="header-divider"></div>
  <span class="project-tag">PRODUCTION MANAGEMENT SYSTEM</span>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <div class="mode-switcher">
      <button class="mode-btn active" id="btn-yard" onclick="setMode('yard')">YARD</button>
      <button class="mode-btn" id="btn-mid" onclick="setMode('midsection')">MIDSECTION</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <svg id="refresh-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      REFRESH
    </button>
  </div>
</header>

<main>
  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card" style="--accent-color:var(--accent)">
      <div class="stat-label">Total Drawings</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">All entries</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--accent2)">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="stat-done">—</div>
      <div class="stat-sub" id="stat-done-pct">—</div>
    </div>
    <div class="stat-card" style="--accent-color:#60a5fa">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" id="stat-wip">—</div>
      <div class="stat-sub">Active work</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--warning)">
      <div class="stat-label">In Review</div>
      <div class="stat-value" id="stat-rev">—</div>
      <div class="stat-sub">Pending check</div>
    </div>
    <div class="stat-card" style="--accent-color:var(--danger)">
      <div class="stat-label">Not Started</div>
      <div class="stat-value" id="stat-ns">—</div>
      <div class="stat-sub">Backlog</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search-box" id="searchInput" placeholder="Search drawings, titles…" oninput="filterData()">
    <select class="filter-select" id="filterStatus" onchange="filterData()">
      <option value="">ALL STATUS</option>
      <option value="Not Started">NOT STARTED</option>
      <option value="In Progress">IN PROGRESS</option>
      <option value="Review">REVIEW</option>
      <option value="Completed">COMPLETED</option>
      <option value="On Hold">ON HOLD</option>
    </select>
    <select class="filter-select" id="filterAssignee" onchange="filterData()">
      <option value="">ALL ASSIGNEES</option>
      <option>Ananthan</option>
      <option>Dinesh</option>
      <option>Rishi</option>
      <option>Praveen</option>
      <option>Sajeev</option>
      <option>Shruthi</option>
    </select>
    <button class="btn-primary" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      ADD DRAWING
    </button>
  </div>

  <!-- YARD tree view -->
  <div id="yardView">
    <div class="section-label">YARD STRUCTURE</div>
    <div class="tree-container" id="treeContainer">
      <div class="loading-row" style="padding:40px; text-align:center; color:var(--text-muted); font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:2px;">
        <span class="spinner"></span>LOADING STRUCTURE...
      </div>
    </div>
  </div>

  <!-- MIDSECTION flat table -->
  <div id="midsectionView" style="display:none;">
    <div class="section-label">MIDSECTION DRAWINGS</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th class="col-num">DWG NO.</th>
            <th class="col-title">TITLE</th>
            <th class="col-status">STATUS</th>
            <th class="col-assignee">ASSIGNEE</th>
            <th class="col-progress">PROGRESS</th>
          </tr>
        </thead>
        <tbody id="midTable">
          <tr class="loading-row"><td colspan="5"><span class="spinner"></span>LOADING DATA...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Add Drawing Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">ADD NEW DRAWING</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Drawing Number</label>
        <input id="inp-num" placeholder="e.g. MDU-NLL-001">
      </div>
      <div class="field">
        <label>Mode</label>
        <select id="inp-mode">
          <option>Yard</option>
          <option>Midsection</option>
        </select>
      </div>
      <div class="field full">
        <label>Title</label>
        <input id="inp-title" placeholder="Drawing title / description">
      </div>
      <div class="field">
        <label>Section</label>
        <input id="inp-section" placeholder="e.g. Section A">
      </div>
      <div class="field">
        <label>Sub-section</label>
        <input id="inp-sub" placeholder="e.g. MDU-NLL">
      </div>
      <div class="field">
        <label>Assignee</label>
        <select id="inp-assignee">
          <option>Ananthan</option>
          <option>Dinesh</option>
          <option>Rishi</option>
          <option>Praveen</option>
          <option>Sajeev</option>
          <option>Shruthi</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="inp-status">
          <option>Not Started</option>
          <option>In Progress</option>
          <option>Review</option>
          <option>Completed</option>
          <option>On Hold</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
      <button class="btn-primary" onclick="addDrawing()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        SUBMIT
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxCHxCcVFjBV-kS5dN2E9_QWll83R0uayD6VAf4W6c4KoWjeZuP47pj_dirpUS5_Us80w/exec";
let allData = [];
let currentMode = 'yard';

const AVATARS = {
  Ananthan:'#1e6fff', Dinesh:'#00c9a7', Rishi:'#f59e0b',
  Praveen:'#8b5cf6', Sajeev:'#ef4444', Shruthi:'#ec4899', Shurthi:'#ec4899'
};

const STATUS_MAP = {
  'Not Started':'not-started',
  'In Progress':'in-progress',
  'Review':'review',
  'Completed':'completed',
  'On Hold':'on-hold'
};

const PROGRESS_MAP = {
  'Not Started':0, 'In Progress':45, 'Review':75, 'Completed':100, 'On Hold':20
};

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-yard').classList.toggle('active', mode==='yard');
  document.getElementById('btn-mid').classList.toggle('active', mode==='midsection');
  document.getElementById('yardView').style.display = mode==='yard' ? '' : 'none';
  document.getElementById('midsectionView').style.display = mode==='midsection' ? '' : 'none';
  renderCurrent();
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  // Show loading states
  document.getElementById('treeContainer').innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted);font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;"><span class="spinner"></span>LOADING STRUCTURE...</div>`;
  document.getElementById('midTable').innerHTML = `<tr class="loading-row"><td colspan="5"><span class="spinner"></span>LOADING DATA...</td></tr>`;

  try {
    const res = await fetch(API + '?t=' + Date.now());
    allData = await res.json();
    updateStats();
    renderCurrent();
    showToast('Data refreshed successfully');
  } catch(e) {
    showToast('Failed to load data — check connection', true);
    document.getElementById('treeContainer').innerHTML = `<div style="padding:40px;text-align:center;color:var(--danger);font-family:'Share Tech Mono',monospace;font-size:12px;">CONNECTION ERROR</div>`;
    document.getElementById('midTable').innerHTML = `<tr class="loading-row"><td colspan="5" style="color:var(--danger)">FAILED TO LOAD</td></tr>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

function updateStats() {
  const t = allData.length;
  const done = allData.filter(d=>d.Status==='Completed').length;
  const wip  = allData.filter(d=>d.Status==='In Progress').length;
  const rev  = allData.filter(d=>d.Status==='Review').length;
  const ns   = allData.filter(d=>d.Status==='Not Started').length;
  document.getElementById('stat-total').textContent = t;
  document.getElementById('stat-done').textContent  = done;
  document.getElementById('stat-done-pct').textContent = t ? Math.round(done/t*100)+'% complete' : '0%';
  document.getElementById('stat-wip').textContent   = wip;
  document.getElementById('stat-rev').textContent   = rev;
  document.getElementById('stat-ns').textContent    = ns;
}

function renderCurrent() {
  if (currentMode === 'yard') renderYard();
  else renderMidsection();
}

function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const assignee = document.getElementById('filterAssignee').value;
  return allData.filter(d => {
    const matchSearch = !search ||
      (d.Number||'').toLowerCase().includes(search) ||
      (d.Title||'').toLowerCase().includes(search);
    const matchStatus = !status || d.Status === status;
    const matchAssignee = !assignee || d.Assignee === assignee;
    return matchSearch && matchStatus && matchAssignee;
  });
}

function filterData() {
  updateStats();
  renderCurrent();
}

/* ---- YARD TREE RENDER ---- */
function renderYard() {
  const data = getFiltered().filter(d => !d.Mode || d.Mode === 'Yard');
  const container = document.getElementById('treeContainer');

  if (!data.length) {
    container.innerHTML = `<div class="empty-state"><p>NO YARD DRAWINGS FOUND</p></div>`;
    return;
  }

  // Group: Section → SubSection → [drawings]
  const tree = {};
  data.forEach(d => {
    const sec = d.Section || 'Unassigned';
    const sub = d.SubSection || d['Sub-section'] || d.Sub || 'General';
    if (!tree[sec]) tree[sec] = {};
    if (!tree[sec][sub]) tree[sec][sub] = [];
    tree[sec][sub].push(d);
  });

  let html = '';
  for (const sec in tree) {
    const secCount = Object.values(tree[sec]).flat().length;
    const secId = 'sec-' + sec.replace(/\s+/g,'_');
    html += `
    <div class="tree-node">
      <div class="tree-section-header" onclick="toggleNode('${secId}')">
        <div class="tree-toggle" id="tog-${secId}">▶</div>
        <span class="tree-section-name">${sec}</span>
        <span class="tree-count">${secCount} DWGs</span>
        ${sectionBadges(Object.values(tree[sec]).flat())}
      </div>
      <div class="tree-children" id="${secId}">`;

    for (const sub in tree[sec]) {
      const items = tree[sec][sub];
      const subId = secId + '-' + sub.replace(/\s+/g,'_');
      html += `
        <div class="tree-node">
          <div class="tree-sub-header" onclick="toggleNode('${subId}')">
            <div class="tree-connector"></div>
            <div class="tree-toggle" id="tog-${subId}" style="width:14px;height:14px;font-size:9px;">▶</div>
            <span class="tree-sub-name">${sub}</span>
            <span class="tree-count" style="font-size:10px;">${items.length}</span>
            ${sectionBadges(items)}
          </div>
          <div class="tree-sub-children" id="${subId}">`;

      items.forEach(d => {
        html += buildLeaf(d);
      });

      html += `</div></div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function sectionBadges(items) {
  const counts = {};
  items.forEach(d => { counts[d.Status] = (counts[d.Status]||0)+1; });
  return Object.entries(counts).slice(0,3).map(([s,c]) =>
    `<span class="badge badge-${STATUS_MAP[s]||'not-started'}" style="font-size:10px;padding:2px 7px;">${c} ${s}</span>`
  ).join(' ');
}

function buildLeaf(d) {
  const color = AVATARS[d.Assignee] || '#64748b';
  const init = (d.Assignee||'?')[0].toUpperCase();
  const prog = PROGRESS_MAP[d.Status] || 0;
  const bClass = STATUS_MAP[d.Status] || 'not-started';
  return `
  <div class="tree-leaf">
    <div class="tree-leaf-connector"></div>
    <span class="drawing-num" style="width:120px;flex-shrink:0;">${d.Number||'—'}</span>
    <span class="drawing-title" style="flex:1;font-size:12px;">${d.Title||'—'}</span>
    <span class="badge badge-${bClass}"  style="margin-right:8px;">
      <span class="badge-dot"></span>${d.Status||'Not Started'}
    </span>
    <div class="assignee-chip" style="margin-right:8px;">
      <div class="avatar" style="background:${color}">${init}</div>
      <span style="font-size:11px;">${d.Assignee||'—'}</span>
    </div>
    <div class="progress-bar" title="${prog}% complete">
      <div class="progress-fill" style="width:${prog}%"></div>
    </div>
  </div>`;
}

function toggleNode(id) {
  const el = document.getElementById(id);
  const tog = document.getElementById('tog-' + id);
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  if (tog) tog.textContent = isOpen ? '▼' : '▶';
}

/* ---- MIDSECTION TABLE ---- */
function renderMidsection() {
  const data = getFiltered().filter(d => !d.Mode || d.Mode === 'Midsection');
  const tbody = document.getElementById('midTable');

  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>NO MIDSECTION DRAWINGS FOUND</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(d => {
    const bClass = STATUS_MAP[d.Status] || 'not-started';
    const color = AVATARS[d.Assignee] || '#64748b';
    const init = (d.Assignee||'?')[0].toUpperCase();
    const prog = PROGRESS_MAP[d.Status] || 0;
    return `
    <tr>
      <td class="col-num"><span class="drawing-num">${d.Number||'—'}</span></td>
      <td class="col-title"><span class="drawing-title">${d.Title||'—'}</span></td>
      <td class="col-status">
        <span class="badge badge-${bClass}">
          <span class="badge-dot"></span>${d.Status||'Not Started'}
        </span>
      </td>
      <td class="col-assignee">
        <div class="assignee-chip">
          <div class="avatar" style="background:${color}">${init}</div>
          ${d.Assignee||'—'}
        </div>
      </td>
      <td class="col-progress">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-bar" style="width:60px;">
            <div class="progress-fill" style="width:${prog}%"></div>
          </div>
          <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-muted);">${prog}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

/* ---- MODAL ---- */
function openModal() {
  document.getElementById('inp-mode').value = currentMode === 'yard' ? 'Yard' : 'Midsection';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

async function addDrawing() {
  const number   = document.getElementById('inp-num').value.trim();
  const title    = document.getElementById('inp-title').value.trim();
  const assignee = document.getElementById('inp-assignee').value;
  const status   = document.getElementById('inp-status').value;
  const section  = document.getElementById('inp-section').value.trim();
  const sub      = document.getElementById('inp-sub').value.trim();
  const mode     = document.getElementById('inp-mode').value;

  if (!number || !title) { showToast('Drawing number and title are required', true); return; }

  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ number, title, status, assignee, section, subsection: sub, mode })
    });
    closeModal();
    showToast('Drawing added successfully');
    loadData();
  } catch(e) {
    showToast('Failed to add drawing', true);
  }
}

/* ---- TOAST ---- */
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--accent2)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
loadData();
</script>
</body>
</html>
